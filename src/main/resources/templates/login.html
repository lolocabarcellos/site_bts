<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Army</title>
    <link rel="stylesheet" th:href="@{/css/form.css}">
</head>
<body>

    <div class="cadastro-container">

        <div class="cadastro-box">

            <h1>ARMY ZONE 💜</h1>

            <p>Entre na comunidade Army</p>

            <div id="alerta" style="display:none; padding:10px; border-radius:6px; margin-bottom:12px; text-align:center; font-weight:bold;"></div>

            <form th:action="@{/login}" method="post" id="formLogin">

                <label for="email">Email:</label>
                <input type="email" id="email" name="email">

                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha">

                <button type="submit">Entrar</button>

            </form>

            <p style="margin-top: 16px; text-align: center;">
                Não tem conta? <a th:href="@{/cadastro}">Cadastre-se</a>
            </p>

        </div>

    </div>

    <script th:src="@{/js/login.js}"></script>

</body>
</html>
