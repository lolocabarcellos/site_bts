spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/site
    username: postgres
    password: postgres123
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-postgres.sql
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect